name: MLB Daily Auto Update

on:
  schedule:
    - cron: '0 0 * * *'   # 매일 09:00 KST (UTC 00:00)
  workflow_dispatch:        # 수동 실행 버튼

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: 레포 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install anthropic

      - name: MLB 리포트 생성
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python mlb_daily.py

      - name: GitHub Pages에 자동 배포
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update MLB Review: $(date +'%Y-%m-%d')"
          commit_user_name: AI-Agent
          commit_user_email: ai-agent@mlb-daily-kr.github.io
